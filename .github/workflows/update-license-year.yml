name: Update LICENSE year

on:
  schedule:
    - cron: '5 0 1 1 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-year:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump copyright year
        id: bump
        run: |
          year="$(date -u +%Y)"
          echo "Current year: $year"
          before="$(grep -E '^Copyright \(c\) [0-9]{4} Skuads' LICENSE || true)"
          sed -i -E "s/^Copyright \(c\) [0-9]{4} Skuads/Copyright (c) ${year} Skuads/" LICENSE
          after="$(grep -E '^Copyright \(c\) [0-9]{4} Skuads' LICENSE || true)"
          if [ "$before" = "$after" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LICENSE
          git commit -m "chore(license): bump copyright year to $(date -u +%Y)"
          git push
